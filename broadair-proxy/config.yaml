# Home Assistant add-on manifest.
# `image` is set, so HA PULLS this prebuilt image from GHCR (it does NOT build
# on the device). The {arch} placeholder is replaced with the host's arch, and
# HA pulls `<image>:<version>` — so the CI must publish that arch/version tag.
name: Broad Air TLS Proxy
version: "1.0.1"
slug: broadair_proxy
description: >-
  TLS-terminating MITM proxy that captures/relays the Broad "Fresh Lung"
  purifier's cloud frames (Phase 1). Log tab shows frames live.
url: https://github.com/WiNloSt/broadair-automation
# GHCR namespace is your GitHub owner, lowercased. Change if you fork/rename.
image: "ghcr.io/winlost/broadair-proxy-{arch}"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: services
boot: auto
# The module's Server Port is baked in as 8103; we must listen there.
ports:
  8103/tcp: 8103
ports_description:
  8103/tcp: TLS port the Broad WiFi module connects to (matches broadcleanair.net:8103)
# Persistent hex-frame logs land in /share/broadair-proxy (browsable via Samba).
map:
  - share:rw
options:
  upstream_ip: "47.110.148.39"
  upstream_port: 8103
  upstream_sni: "broadcleanair.net"
  verify_upstream: false
schema:
  upstream_ip: str
  upstream_port: port
  upstream_sni: str
  verify_upstream: bool
